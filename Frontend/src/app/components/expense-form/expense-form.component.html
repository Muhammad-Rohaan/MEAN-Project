<div class="card">
  <h1>{{ isEditMode ? 'Edit Expense' : 'Add Expense' }}</h1>
  <form [formGroup]="expenseForm" (ngSubmit)="onSubmit()">
    <div class="form-group">
      <label for="title">Title</label>
      <input type="text" id="title" formControlName="title" required>
    </div>

    <div class="form-group">
      <label for="amount">Amount</label>
      <input type="number" id="amount" formControlName="amount" step="0.01" required>
    </div>

    <div class="form-group">
      <label for="category">Category</label>
      <select id="category" formControlName="category" required>
        <option value="">Select a category</option>
        <option *ngFor="let cat of categories" [value]="cat">{{ cat }}</option>
      </select>
    </div>

    <div class="form-group">
      <label for="date">Date</label>
      <input type="date" id="date" formControlName="date" required>
    </div>

    <div class="form-group">
      <label for="userType">User Type</label>
      <select id="userType" formControlName="userType">
        <option *ngFor="let type of userTypes" [value]="type">{{ type | titlecase }}</option>
      </select>
    </div>

    <div class="form-group" *ngIf="expenseForm.get('userType')?.value === 'institute'">
      <label for="batch">Batch</label>
      <input type="text" id="batch" formControlName="batch">
    </div>

    <div class="form-group" *ngIf="expenseForm.get('userType')?.value === 'institute'">
      <label for="course">Course</label>
      <input type="text" id="course" formControlName="course">
    </div>

    <div class="form-group" *ngIf="expenseForm.get('userType')?.value === 'institute'">
      <label style="display: flex; gap: 8px; align-items: center;">
        <input type="checkbox" formControlName="isFeePayment">
        Is Fee Payment?
      </label>
    </div>

    <div class="form-group">
      <label for="reminderDate">Reminder Date</label>
      <input type="date" id="reminderDate" formControlName="reminderDate">
    </div>

    <div class="form-group">
      <label for="reminderNote">Reminder Note</label>
      <textarea id="reminderNote" formControlName="reminderNote" rows="2"></textarea>
    </div>

    <div class="form-group">
      <label for="description">Description</label>
      <textarea id="description" formControlName="description" rows="3"></textarea>
    </div>

    <button type="submit" class="btn btn-primary" [disabled]="!expenseForm.valid">
      {{ isEditMode ? 'Update' : 'Add' }} Expense
    </button>
    <a routerLink="/expenses" class="btn btn-warning">Cancel</a>
  </form>
</div>
