<div class="card calendar-container">
  <h1>Payment Reminders & Calendar</h1>
  
  <div class="calendar-header">
    <button (click)="prevMonth()" class="btn btn-warning">&laquo; Prev</button>
    <h2>{{ getMonthName(currentMonth) }} {{ currentYear }}</h2>
    <button (click)="nextMonth()" class="btn btn-primary">Next &raquo;</button>
  </div>

  <div class="calendar-grid">
    <div class="calendar-day header">Sun</div>
    <div class="calendar-day header">Mon</div>
    <div class="calendar-day header">Tue</div>
    <div class="calendar-day header">Wed</div>
    <div class="calendar-day header">Thu</div>
    <div class="calendar-day header">Fri</div>
    <div class="calendar-day header">Sat</div>

    <div 
      *ngFor="let day of calendarDays; let i = index" 
      class="calendar-day"
      [class.other-month]="!day"
    >
      <div *ngIf="day" class="day-number">{{ day.getDate() }}</div>
      <div *ngIf="day && getExpensesForDate(day).length > 0" class="expense-dots">
        <div 
          *ngFor="let exp of getExpensesForDate(day)" 
          class="dot"
          [title]="exp.title + ': $' + exp.amount"
        ></div>
      </div>
    </div>
  </div>
</div>
